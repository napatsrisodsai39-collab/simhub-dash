<!DOCTYPE html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Simhub Dashboard</title>
<style>
body{font-family:'Sarabun',system-ui,sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px}
.box{background:#fff;border:1px solid #dcdfe4;border-radius:14px;padding:28px 24px;max-width:340px;width:100%;text-align:center;box-shadow:0 2px 8px rgba(16,24,40,.06)}
h3{margin:10px 0 18px;color:#1c2b33;font-size:17px}
input[type=password]{width:100%;box-sizing:border-box;font-size:16px;padding:12px 14px;border:1px solid #dcdfe4;border-radius:9px;outline:none;text-align:center}
input[type=password]:focus{border-color:#0866ff}
label{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12.5px;color:#65767e;margin:12px 0}
button{width:100%;background:#0866ff;color:#fff;border:none;font-size:15px;font-weight:700;padding:12px;border-radius:9px;cursor:pointer;font-family:inherit}
#err{color:#c92435;font-size:13px;margin-top:10px;min-height:18px}
.note{font-size:11px;color:#8a979e;margin-top:14px}
</style></head><body>
<div class="box">
  <div style="font-size:36px">📡</div>
  <h3>Simhub Ads Dashboard</h3>
  <input id="pw" type="password" placeholder="รหัสผ่าน" autocomplete="current-password">
  <label><input type="checkbox" id="rem" checked> จำรหัสในเครื่องนี้</label>
  <button onclick="go()">เปิดดู</button>

  <div class="note">ข้อมูลเข้ารหัสทั้งหน้า เปิดได้เฉพาะคนมีรหัสผ่าน</div>
</div>

const b=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function dec(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b(SALT),iterations:310000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b(IV)},key,b(DATA));
  return new TextDecoder().decode(pt);
}
async function show(pw,remember){
  const html=await dec(pw);
  if(remember)localStorage.setItem('shpw',pw);
  document.open();document.write(html);document.close();
}
async function go(){
  const pw=document.getElementById('pw').value;
  try{await show(pw,document.getElementById('rem').checked)}
  catch(e){document.getElementById('err').textContent='รหัสไม่ถูกต้อง ลองใหม่ค่ะ'}
}
window.addEventListener('load',async()=>{
  const s=localStorage.getItem('shpw');
  if(s){try{await show(s,true)}catch(e){localStorage.removeItem('shpw')}}
});
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go()});
</script></body></html>
